<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash - Life on Land</title>
    <style>
        body {
            background-color: #212121;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .splash-content h1 {
            color: #D3ECCD;
            font-size: 3em;
            margin-bottom: 20px;
        }

        .splash-content p {
            color: #aaa;
            margin-bottom: 40px;
        }

        .enter-btn {
            background-color: #0FB855;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.2em;
            font-weight: bold;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background-color: #0A9442;
        }
    </style>
</head>

<body>
    <div class="splash-content">
        <h1>Life on Land</h1>
        <p>SDG 15 conservation awareness portal</p>
        <p id="countdown-display">Entering site in 4...</p>
        <a href="home.html" class="enter-btn">Enter Website</a>
    </div>
<script src="splashscreen.js"></script>
</body>

</html>
