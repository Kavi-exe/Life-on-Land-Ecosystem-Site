<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta id="meta-redirect" http-equiv="refresh" content="4;url=home.html">
    
    <title>Land Verse | Splash Screen</title>

    <style>
        /* === STYLING REQUIREMENTS === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevent scrolling on splash screen */
        }

        /* Background Image with Readability Overlay */
        .splash-container {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Placeholder forest image - replace URL with your own local image if needed */
            background: url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            color: #ffffff;
        }

        /* Dark overlay to ensure text remains readable */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 30, 15, 0.7); /* Deep dark green/black overlay */
            z-index: 1;
        }

        /* Content wrapper to sit above the overlay */
        .content {
            position: relative;
            z-index: 2;
            padding: 2rem;
            max-width: 800px;
        }

        /* Website Title */
        h1 {
            font-size: 4rem;
            font-weight: 700;
            color: #81c784; /* Earthy green tone */
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Website Mission */
        .mission {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #e8f5e9;
        }

        /* Group Members */
        .team {
            font-size: 1rem;
            color: #a5d6a7;
            margin-bottom: 3rem;
            font-style: italic;
        }

        /* === CSS LOADER ANIMATION === */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #81c784; /* Green spinner */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Countdown Timer Text */
        .countdown-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        /* Skip Intro Button */
        .skip-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #81c784;
            padding: 10px 24px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .skip-btn:hover {
            background-color: #81c784;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Land Verse</h1>
            
            <p class="mission">
                Dedicated to protecting, restoring, and promoting the sustainable use of terrestrial ecosystems. <br>
                Join us in preserving Life on Land for future generations.
            </p>
            
            <p class="team">
                Team Members: [Insert Name 1], [Insert Name 2], [Insert Name 3]
            </p>

            <div class="loader"></div>
            
            <div class="countdown-text" id="countdown-display">
                Entering site in 4...
            </div>

            <button class="skip-btn" id="skip-btn">Skip Intro</button>
        </div>
    </div>

    <script>
        // 1. Countdown Timer Logic
        let timeLeft = 4;
        const countdownDisplay = document.getElementById('countdown-display');
        
        const countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                countdownDisplay.textContent = `Entering site in ${timeLeft}...`;
            } else {
                countdownDisplay.textContent = "Loading...";
                clearInterval(countdownInterval);
            }
        }, 1000);

        // 2. Skip Intro Button Logic
        const skipBtn = document.getElementById('skip-btn');
        skipBtn.addEventListener('click', () => {
            // Optional but recommended: Remove the meta tag so it doesn't try to redirect twice
            const metaTag = document.getElementById('meta-redirect');
            if (metaTag) {
                metaTag.remove(); 
            }
            
            // Redirect immediately to Home Page
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
