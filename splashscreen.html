<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta id="meta-redirect" http-equiv="refresh" content="4;url=home.html">
    
    <title>Land Verse | Splash Screen</title>

    
</head>
<body>

    <div class="splash-container">
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Land Verse</h1>
            
            <p class="mission">
                Dedicated to protecting, restoring, and promoting the sustainable use of terrestrial ecosystems. <br>
                Join us in preserving Life on Land for future generations.
            </p>
            
            <p class="team">
                Team Members: [Insert Name 1], [Insert Name 2], [Insert Name 3]
            </p>

            <div class="loader"></div>
            
            <div class="countdown-text" id="countdown-display">
                Entering site in 4...
            </div>

            <button class="skip-btn" id="skip-btn">Skip Intro</button>
        </div>
    </div>

    <script>
        // 1. Countdown Timer Logic
        let timeLeft = 4;
        const countdownDisplay = document.getElementById('countdown-display');
        
        const countdownInterval = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                countdownDisplay.textContent = `Entering site in ${timeLeft}...`;
            } else {
                countdownDisplay.textContent = "Loading...";
                clearInterval(countdownInterval);
            }
        }, 1000);

        // 2. Skip Intro Button Logic
        const skipBtn = document.getElementById('skip-btn');
        skipBtn.addEventListener('click', () => {
            // Optional but recommended: Remove the meta tag so it doesn't try to redirect twice
            const metaTag = document.getElementById('meta-redirect');
            if (metaTag) {
                metaTag.remove(); 
            }
            
            // Redirect immediately to Home Page
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
